spring.application.name=aiproject
server.port=8082

# datasource - injected from pipeline env variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3308/spring_ai}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# vector store - initialize-schema creates the table automatically
spring.ai.vectorstore.mariadb.initialize-schema=true
spring.ai.vectorstore.mariadb.distance-type=COSINE
spring.ai.vectorstore.mariadb.dimensions=1536

# openai - injected from GitHub Secrets
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY}
spring.ai.openai.model=gpt-4
spring.ai.openai.timeout=60s

logging.level.org.springframework.ai=DEBUG
